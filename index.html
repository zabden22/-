<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitWay - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="form-side">
                <div class="brand-header">
                    <img src="11fc662484192f59b3906d1d5669228f9f707453.png" alt="TransitWay" class="main-logo">
                </div>

                <div class="login-box">
                    <h1>Login your account</h1>
                    <p class="subtitle">Login to explore</p>

                    <form id="loginForm">
                        <div class="input-container">
                            <i class="far fa-envelope"></i>
                            <input type="email" placeholder="Email" id="email" required>
                        </div>

                        <div class="input-container">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="Password" id="password" required>
                        </div>

                        <div class="forgot-link">
                            <a href="forgot.html">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn-continue">Continue</button>
                    </form>

                    <div class="social-section">
                        <span>Sign in With</span>
                        <div class="social-icons">
                            <a href="#"><i class="fab fa-google"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="image-side">
                <div class="gov-header">
                    <img src="aad2dd876dee8682b5a218c7eae46b04e55935c5.png" alt="Government" class="gov-logo-img">
                </div>

                <div class="illustration-box">
                    <img src="f0e581ed0be66f0c6c4d016a77f0e50dccf1a06f.png" alt="Illustration">
                </div>

                <div class="glass-welcome">
                    <h3>Welcome to the community</h3>
                    <p>Login to explore the system</p>
                    <div class="pagination-dots">
                        <span></span><span></span><span class="active"></span><span></span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="login.js?v=1.1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitWay - Verify Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="verify.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="form-side">
                <div class="brand-header">
                    <img src="11fc662484192f59b3906d1d5669228f9f707453.png" alt="TransitWay" class="main-logo">
                </div>

                <div class="login-box">
                    <button class="back-btn" onclick="window.history.back()">
                        <i class="fas fa-chevron-left"></i> Back
                    </button>
                    
                    <h1>Verify Your Email</h1>
                    <p class="subtitle">Enter the 6-digit code we sent to your email</p>

                    <div class="otp-container">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                    </div>

                    <button type="button" onclick="handleVerifyAndRedirect()" class="btn-continue">Verify Code</button>
                    
                    <p class="resend-text">Didn't receive the code? <a href="verify.html">Resend Code</a></p>
                </div>
            </div>

            <div class="image-side">
                <div class="gov-header">
                    <img src="aad2dd876dee8682b5a218c7eae46b04e55935c5.png" alt="Government" class="gov-logo-img">
                </div>

                <div class="illustration-box">
                    <img src="7e561f202f13163960fe1b516ad6fb55c2378e30.png" alt="Verify Illustration">
                </div>

                <div class="glass-welcome">
                    <h3>One Step Closer!</h3>
                    <p>Verification helps us keep your account safe and secure. Please do not share this code with anyone.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="verfiy.js?v=1.1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitWay - Tickets & Sales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="i18n.js?v=1.1"></script>
    <script src="user-dropdown.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="side-logo">
                <img src="11fc662484192f59b3906d1d5669228f9f707453.png" alt="TransitWay Logo">
            </div>
            <nav class="side-nav">
                <a href="dashboard.html" data-i18n="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="map.html" data-i18n="live_map"><i class="fas fa-map-marked-alt"></i> Live Map</a>
                <a href="admins.html" data-i18n="admins"><i class="fas fa-user-shield"></i> Admins</a>
                <a href="buses.html" data-i18n="buses"><i class="fas fa-bus"></i> Buses</a>
                <a href="drivers.html" data-i18n="drivers"><i class="fas fa-users"></i> Drivers</a>
                <a href="users.html" data-i18n="users"><i class="fas fa-user"></i> Users</a>
                <a href="stations.html" data-i18n="stations"><i class="fas fa-map-marker-alt"></i> Stations</a>
                <a href="tickets.html" class="active" data-i18n="tickets"><i class="fas fa-ticket-alt"></i> Tickets</a>
                <a href="routes.html" data-i18n="routes"><i class="fas fa-route"></i> Routes</a>
                <a href="reports.html" data-i18n="reports"><i class="fas fa-exclamation-triangle"></i> Reports</a>
                <a href="settings.html" data-i18n="settings"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-left" style="display: flex; align-items: center; gap: 15px;">
                    <button class="hamburger-btn" id="sidebarToggle" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 40px; height: 40px; border-radius: 10px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.3s;">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="path-title" style="margin-bottom: 0;">Tickets & Sales</h2>
                </div>
                <div class="top-controls">
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Moscow&background=random&color=fff&rounded=true&bold=true&size=32" class="top-avatar" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color);">
                        <span id="topBarName">Loading...</span>
                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>
                </div>
            </header>
            
            <!-- ===== Tickets Summary Bar ===== -->
            <div class="tickets-summary-bar" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div class="summary-item" style="background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px;">
                    <div style="background: rgba(86, 142, 116, 0.1); color: #568e74; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;"><i class="fas fa-ticket-alt"></i></div>
                    <div>
                        <h4 id="summaryTotalSold" style="margin:0; font-size:1.4rem; font-weight:800; color:var(--text-main);">0</h4>
                        <p style="margin:0; font-size:0.85rem; color:var(--text-muted); font-weight:600;" data-i18n-text="Sold Tickets">Total Sold</p>
                    </div>
                </div>
                <div class="summary-item" style="background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px;">
                    <div style="background: rgba(34, 197, 94, 0.1); color: #22c55e; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <h4 id="summaryAvailable" style="margin:0; font-size:1.4rem; font-weight:800; color:var(--text-main);">0</h4>
                        <p style="margin:0; font-size:0.85rem; color:var(--text-muted); font-weight:600;" data-i18n-text="Available Tickets">Available</p>
                    </div>
                </div>
                <div class="summary-item" style="background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px;">
                    <div style="background: rgba(6, 182, 212, 0.1); color: #06b6d4; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;"><i class="fas fa-history"></i></div>
                    <div>
                        <h4 id="summaryUsed" style="margin:0; font-size:1.4rem; font-weight:800; color:var(--text-main);">0</h4>
                        <p style="margin:0; font-size:0.85rem; color:var(--text-muted); font-weight:600;" data-i18n-text="Used Tickets">Used</p>
                    </div>
                </div>
            </div>
            
            <div class="actions-bar" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
                <div>
                    <h3 style="margin: 0; font-size: 1.4rem; color: var(--text-main); font-weight: 800;">Recent Transactions</h3>
                    <p style="margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.95rem; font-weight: 600;">Monitor daily ticket sales and validations</p>
                </div>
                
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="ticketSearchInput" placeholder="Search Ticket ID or User...">
                    </div>
                    
                    <button onclick="filterByUser()" style="background: transparent; border: 2px solid #3b82f6; color: #3b82f6; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.9rem;" onmouseover="this.style.background='#3b82f6'; this.style.color='#fff'" onmouseout="this.style.background='transparent'; this.style.color='#3b82f6'">
                        <i class="fas fa-user"></i> <i class="fas fa-filter"></i> By User
                    </button>

                </div>
            </div>

            <section class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Passenger Name</th>
                            <th>Route</th>
                            <th>Purchase Date</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTableBody">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="tickets-logic.js?v=1.1"></script>
</body>
</html>

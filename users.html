<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitWay - Users Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="i18n.js?v=1.1"></script>
    <script src="global.js"></script>

    <style>
        /* ═══════════════════════════════════════
           🛡️ Users Page — Premium Styles
           ═══════════════════════════════════════ */
        .users-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 28px 32px;
            background: linear-gradient(135deg, rgba(86,142,116,0.08) 0%, rgba(86,142,116,0.02) 100%);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .users-hero::before {
            content: '';
            position: absolute;
            top: -40%; right: -10%;
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(86,142,116,0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        .users-hero-icon {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: var(--primary-color);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 6px 20px rgba(86,142,116,0.25);
            flex-shrink: 0;
        }
        .users-hero-text h2 {
            font-size: 1.3rem; font-weight: 800;
            color: var(--text-main); margin: 0 0 4px;
        }
        .users-hero-text p {
            color: var(--text-muted); font-weight: 600;
            font-size: 0.9rem; margin: 0;
        }

        /* User Stats */
        .user-stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .user-stat-mini {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.3s ease;
        }
        .user-stat-mini:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .user-stat-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
        }
        .user-stat-mini h4 {
            font-size: 1.3rem; font-weight: 800;
            color: var(--text-main); margin: 0; line-height: 1;
        }
        .user-stat-mini p {
            font-size: 0.78rem; font-weight: 700;
            color: var(--text-muted); margin: 2px 0 0;
        }

        /* User Cards (Grid view) */
        .user-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .user-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
        }
        .user-card:nth-child(1)::before { background: linear-gradient(90deg, #568e74, #6ee7b7); }
        .user-card:nth-child(2)::before { background: linear-gradient(90deg, #3b82f6, #93c5fd); }
        .user-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
        .user-card:nth-child(4)::before { background: linear-gradient(90deg, #8b5cf6, #c4b5fd); }
        .user-card:nth-child(5)::before { background: linear-gradient(90deg, #ef4444, #fca5a5); }
        .user-card:nth-child(n+6)::before { background: linear-gradient(90deg, #06b6d4, #67e8f9); }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-color: var(--primary-color);
        }
        .user-card-header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 18px;
        }
        .user-card-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid var(--primary-color);
            box-shadow: 0 3px 10px rgba(86,142,116,0.15);
            object-fit: cover;
        }
        .user-card-name {
            font-size: 1.05rem; font-weight: 800;
            color: var(--text-main); margin: 0 0 2px;
        }
        .user-card-id {
            font-size: 0.78rem; font-weight: 700;
            color: var(--primary-color); font-family: monospace;
        }
        .user-card-status {
            position: absolute; top: 18px; right: 18px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .user-card-status.active { background: rgba(34,197,94,0.1); color: #22c55e; }
        .user-card-status.inactive { background: rgba(239,68,68,0.1); color: #ef4444; }

        .user-card-details {
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 18px;
        }
        .user-card-detail {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.88rem; font-weight: 600;
            color: var(--text-muted);
        }
        .user-card-detail i {
            width: 16px; text-align: center;
            color: var(--primary-color); font-size: 0.8rem;
        }
        .user-card-detail span { color: var(--text-main); font-weight: 700; }

        .user-card-actions {
            display: flex; gap: 10px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .user-action-btn {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-main);
            color: var(--text-muted);
            font-weight: 700; font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .user-action-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(86,142,116,0.04);
        }
        .user-action-btn.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239,68,68,0.04);
        }
        
        /* Role badge in card */
        .user-role-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 8px;
            font-size: 0.72rem; font-weight: 800;
            text-transform: uppercase;
            background: rgba(139,92,246,0.08);
            color: #8b5cf6;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .user-cards-grid { grid-template-columns: 1fr; }
            .users-hero { flex-direction: column; text-align: center; }
        }
    </style>
    <script src="user-dropdown.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="side-logo">
                <img src="11fc662484192f59b3906d1d5669228f9f707453.png" alt="TransitWay Logo">
            </div>
            <nav class="side-nav">
                <a href="dashboard.html" data-i18n="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="map.html" data-i18n="live_map"><i class="fas fa-map-marked-alt"></i> Live Map</a>
                <a href="admins.html" data-i18n="admins"><i class="fas fa-user-shield"></i> Admins</a>
                <a href="buses.html" data-i18n="buses"><i class="fas fa-bus"></i> Buses</a>
                <a href="drivers.html" data-i18n="drivers"><i class="fas fa-users"></i> Drivers</a>
                <a href="users.html" class="active" data-i18n="users"><i class="fas fa-user"></i> Users</a>
                <a href="stations.html" data-i18n="stations"><i class="fas fa-map-marker-alt"></i> Stations</a>
                <a href="tickets.html" data-i18n="tickets"><i class="fas fa-ticket-alt"></i> Tickets</a>
                <a href="routes.html" data-i18n="routes"><i class="fas fa-route"></i> Routes</a>
                <a href="reports.html" data-i18n="reports"><i class="fas fa-exclamation-triangle"></i> Reports</a>
                <a href="settings.html" data-i18n="settings"><i class="fas fa-cog"></i> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-left" style="display: flex; align-items: center; gap: 15px;">
                    <button class="hamburger-btn" id="sidebarToggle" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 40px; height: 40px; border-radius: 10px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.3s;">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="path-title" style="margin-bottom: 0;">Users Management</h2>
                </div>
                <div class="top-controls">
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Moscow&background=random&color=fff&rounded=true&bold=true&size=32" class="top-avatar" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color);">
                        <span id="topBarName">Loading...</span>
                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>
                </div>
            </header>

            <!-- Hero Banner -->
            <div class="users-hero">
                <div class="users-hero-icon"><i class="fas fa-user-shield"></i></div>
                <div class="users-hero-text">
                    <h2>System Users</h2>
                    <p>Manage user accounts, roles, and access permissions for the TransitWay platform</p>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="user-stats-bar">
                <div class="user-stat-mini">
                    <div class="user-stat-dot" style="background:#8b5cf6;"></div>
                    <div>
                        <h4 id="admStatTotal">0</h4>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="user-stat-mini">
                    <div class="user-stat-dot" style="background:#22c55e;"></div>
                    <div>
                        <h4 id="statActiveUsers">0</h4>
                        <p>Active Users</p>
                    </div>
                </div>
                <div class="user-stat-mini">
                    <div class="user-stat-dot" style="background:#ef4444;"></div>
                    <div>
                        <h4 id="statBannedUsers">0</h4>
                        <p>Banned</p>
                    </div>
                </div>
                <div class="user-stat-mini">
                    <div class="user-stat-dot" style="background:#f59e0b;"></div>
                    <div>
                        <h4 id="statTotalBalance">0</h4>
                        <p>Total Balance (EGP)</p>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearchInput" placeholder="Search by name, ID or email...">
                </div>
                
            </div>

            <!-- User Cards Grid -->
            <div class="user-cards-grid" id="userCardsGrid">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    

    <script src="users-logic.js?v=2.0"></script>
</body>
</html>

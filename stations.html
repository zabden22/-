<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitWay - Stations Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="i18n.js?v=1.1"></script>
    
    <script src="user-dropdown.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="side-logo">
                <img src="11fc662484192f59b3906d1d5669228f9f707453.png" alt="TransitWay Logo">
            </div>
            <nav class="side-nav">
                <a href="dashboard.html" data-i18n="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="map.html" data-i18n="live_map"><i class="fas fa-map-marked-alt"></i> Live Map</a>
                <a href="admins.html" data-i18n="admins"><i class="fas fa-user-shield"></i> Admins</a>
                <a href="buses.html" data-i18n="buses"><i class="fas fa-bus"></i> Buses</a>
                <a href="drivers.html" data-i18n="drivers"><i class="fas fa-users"></i> Drivers</a>
                <a href="users.html" data-i18n="users"><i class="fas fa-user"></i> Users</a>
                <a href="stations.html" class="active" data-i18n="stations"><i class="fas fa-map-marker-alt"></i> Stations</a>
                <a href="tickets.html" data-i18n="tickets"><i class="fas fa-ticket-alt"></i> Tickets</a>
                <a href="routes.html" data-i18n="routes"><i class="fas fa-route"></i> Routes</a>
                <a href="reports.html" data-i18n="reports"><i class="fas fa-exclamation-triangle"></i> Reports</a>
                <a href="settings.html" data-i18n="settings"><i class="fas fa-cog"></i> Settings</a>
            </nav>
           
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-left" style="display: flex; align-items: center; gap: 15px;">
                    <button class="hamburger-btn" id="sidebarToggle" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 40px; height: 40px; border-radius: 10px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.3s;">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="path-title" style="margin-bottom: 0;" data-i18n-text="Stations Network">Stations Network</h2>
                </div>
                <div class="top-controls">
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Moscow&background=random&color=fff&rounded=true&bold=true&size=32" class="top-avatar" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color);">
                        <span id="topBarName">Loading...</span>
                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>
                </div>
            </header>
            
            <div class="actions-bar" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
                <div>
                    <h3 style="margin: 0; font-size: 1.4rem; color: var(--text-main); font-weight: 800;">All Stations</h3>
                    <p style="margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.95rem; font-weight: 600;">Manage bus stops and locations</p>
                </div>
                
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="stationSearchInput" placeholder="Search station name...">
                    </div>
                    
                    <button class="btn-outline" onclick="window.location.href='map.html'" style="background: transparent; border: 2px solid var(--text-muted); color: var(--text-main); padding: 14px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;">
                        <i class="fas fa-map"></i> View on Map
                    </button>
                    
                    <button class="btn-primary" id="openAddStationModalBtn">
                        <i class="fas fa-plus"></i> Add Station
                    </button>
                </div>
            </div>

            <section class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th data-i18n-text="Station ID">???? ??????</th>
                            <th data-i18n-text="Station Name">??? ??????</th>
                            <th data-i18n-text="Coordinates (Lat, Lng)">??????????</th>
                            <th data-i18n-text="Assigned Lines">??????</th>
                            <th data-i18n-text="Status">??????</th>
                            <th data-i18n-text="Actions">???????</th>
                        </tr>
                    </thead>
                    <tbody id="stationTableBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="addStationModal">
        <div class="modal-card">
            <h2>Add New Station</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Add a new physical stop to the network.</p>
            <form id="addStationForm">
                <div class="modal-input">
                    <input type="text" name="name" placeholder="Station Name" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-main); color:var(--text-main); margin-bottom:15px; outline:none; font-weight:600;">
                </div>
                <div class="modal-input">
                    <input type="text" name="zone" placeholder="Zone (e.g., Zone A, Zone B)" style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-main); color:var(--text-main); margin-bottom:15px; outline:none; font-weight:600;">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="modal-input" style="flex: 1;">
                        <input type="number" name="latitude" placeholder="Latitude (e.g., 30.1355)" step="any" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-main); color:var(--text-main); margin-bottom:15px; outline:none; font-weight:600;">
                    </div>
                    <div class="modal-input" style="flex: 1;">
                        <input type="number" name="longitude" placeholder="Longitude (e.g., 31.3499)" step="any" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-main); color:var(--text-main); margin-bottom:15px; outline:none; font-weight:600;">
                    </div>
                </div>
                <div class="modal-input">
                    <select name="route" id="routeSelect" required style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main); margin-bottom: 15px; outline: none; font-weight: 600;">
                        <option value="">Loading routes...</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Station</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('addStationModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="stations-logic.js?v=1.1"></script>
</body>
</html>
